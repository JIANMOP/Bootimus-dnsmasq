services:
  bootimus:
    image: garybowers/bootimus:0.1.38
    container_name: bootimus
    cap_add:
      - NET_BIND_SERVICE
    network_mode: host
    environment:
      BOOTIMUS_PROXY_DHCP_ENABLED: true
      BOOTIMUS_SERVER_ADDR: 172.16.143.3
      TZ: Asia/Shanghai  
#    ports:
#      - "67:67/udp"                         # proxyDHCP
#      - "4011:4011/udp"                     # PXE boot-server discovery
#      - "69:69/udp"                         # TFTP
#      - "8080:8080/tcp"
#      - "8081:8081/tcp"
    volumes:
      - ./data:/data
    restart: unless-stopped
